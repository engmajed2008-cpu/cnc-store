# ═══════════════════════════════════════════════════════════════
# Metal Art — Virtual Host
# metalart.sa  +  www redirect  +  HTTP→HTTPS redirect
# ═══════════════════════════════════════════════════════════════

# ── 1. HTTP → HTTPS redirect ────────────────────────────────
server {
    listen       80;
    listen  [::]:80;
    server_name  metalart.sa www.metalart.sa;

    # Allow Let's Encrypt / ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://metalart.sa$request_uri;
    }
}

# ── 2. www → non-www HTTPS redirect ─────────────────────────
server {
    listen       443 ssl http2;
    listen  [::]:443 ssl http2;
    server_name  www.metalart.sa;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    return 301 https://metalart.sa$request_uri;
}

# ── 3. Main HTTPS server ─────────────────────────────────────
server {
    listen       443 ssl http2;
    listen  [::]:443 ssl http2;
    server_name  metalart.sa;

    # ── SSL certs (Let's Encrypt / STC DV cert) ─────────────
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_trusted_certificate /etc/nginx/ssl/chain.pem;

    # ── Security headers ────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"     always;
    add_header Content-Security-Policy
      "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.moyasar.com https://api.tabby.ai https://api.tamara.co https://wa.me; frame-ancestors 'none';"
      always;

    # ── Root & index ────────────────────────────────────────
    root /var/www/html;

    # ── Connection limits ───────────────────────────────────
    limit_conn conn_limit 50;

    # ─────────────────────────────────────────────────────────
    # Static assets — Next.js _next/static (immutable cache)
    # ─────────────────────────────────────────────────────────
    location /_next/static/ {
        alias  /app/.next/static/;   # or proxy to app; either works
        proxy_pass http://nextjs_upstream;
        proxy_cache          NEXTJS_CACHE;
        proxy_cache_key      "$scheme$host$request_uri";
        proxy_cache_valid    200  365d;
        proxy_cache_use_stale error timeout invalid_header updating;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Cache-Status $upstream_cache_status;
        gzip_static on;
        access_log off;
    }

    # ─────────────────────────────────────────────────────────
    # Public static files (images, fonts, favicon, etc.)
    # ─────────────────────────────────────────────────────────
    location /public/ {
        proxy_pass http://nextjs_upstream;
        proxy_cache         NEXTJS_CACHE;
        proxy_cache_valid   200  30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    location = /favicon.ico  { proxy_pass http://nextjs_upstream; access_log off; }
    location = /robots.txt   { proxy_pass http://nextjs_upstream; access_log off; }
    location = /sitemap.xml  { proxy_pass http://nextjs_upstream; }

    # ─────────────────────────────────────────────────────────
    # Next.js Image Optimization
    # ─────────────────────────────────────────────────────────
    location /_next/image {
        limit_req  zone=web_limit  burst=40  nodelay;
        proxy_pass http://nextjs_upstream;
        proxy_cache         NEXTJS_CACHE;
        proxy_cache_valid   200  7d;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # ─────────────────────────────────────────────────────────
    # API routes — no cache, stricter rate limit
    # ─────────────────────────────────────────────────────────
    location /api/ {
        limit_req  zone=api_limit  burst=15  nodelay;

        proxy_pass         http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
        proxy_connect_timeout 5s;

        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ─────────────────────────────────────────────────────────
    # Webhook endpoints (Moyasar / Tabby / Tamara callbacks)
    # ─────────────────────────────────────────────────────────
    location /api/webhooks/ {
        # Whitelist gateway IPs only (add real IPs)
        # allow 185.28.XXX.0/24;  # Moyasar
        # deny  all;
        proxy_pass         http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection       "";
        proxy_read_timeout 15s;
    }

    # ─────────────────────────────────────────────────────────
    # All other pages (SSR / ISR / RSC)
    # ─────────────────────────────────────────────────────────
    location / {
        limit_req  zone=web_limit  burst=60  nodelay;

        proxy_pass         http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Accept-Language   $http_accept_language;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 5s;
        proxy_buffering     on;
        proxy_buffer_size   8k;
        proxy_buffers       8 16k;

        # SSR pages: short cache, stale-while-revalidate pattern
        proxy_cache             NEXTJS_CACHE;
        proxy_cache_key         "$scheme$host$request_uri$http_accept_language";
        proxy_cache_valid       200 302  1m;
        proxy_cache_valid       404      30s;
        proxy_cache_use_stale   error timeout invalid_header updating
                                http_500 http_502 http_503 http_504;
        proxy_cache_lock        on;
        proxy_cache_lock_timeout 3s;
        proxy_cache_background_update on;

        add_header X-Cache-Status $upstream_cache_status;
    }

    # ─────────────────────────────────────────────────────────
    # Error pages
    # ─────────────────────────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # Block common attack paths
    location ~* \.(git|env|htaccess|htpasswd|yml|yaml|toml|lock)$ {
        deny all;
        return 404;
    }
    location ~* /\. { deny all; return 404; }
}
