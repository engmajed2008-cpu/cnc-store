# ═══════════════════════════════════════════════════════════════
# E3lani — docker-compose.yml
# STC Cloud / Ubuntu 22.04 production stack
# ═══════════════════════════════════════════════════════════════

version: "3.9"

services:

  # ─────────────────────────────────────────────────────────────
  # Next.js Application
  # ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: e3lani-app:latest
    container_name: e3lani_app
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      # ── Payment gateway keys (override via .env or CI secrets) ──
      MOYASAR_PUBLISHABLE_KEY: ${MOYASAR_PUBLISHABLE_KEY:-pk_live_xxx}
      MOYASAR_SECRET_KEY:      ${MOYASAR_SECRET_KEY:-sk_live_xxx}
      TABBY_MERCHANT_CODE:     ${TABBY_MERCHANT_CODE:-}
      TABBY_PUBLIC_KEY:        ${TABBY_PUBLIC_KEY:-}
      TAMARA_MERCHANT_TOKEN:   ${TAMARA_MERCHANT_TOKEN:-}
      # ── SMS / Email ──
      TAQNYAT_TOKEN:           ${TAQNYAT_TOKEN:-}
      RESEND_API_KEY:          ${RESEND_API_KEY:-}
      # ── App ──
      NEXT_PUBLIC_SITE_URL:    ${NEXT_PUBLIC_SITE_URL:-https://e3lani.com}
      NEXT_PUBLIC_WHATSAPP:    ${NEXT_PUBLIC_WHATSAPP:-966500000000}
    volumes:
      - app_logs:/app/logs
    networks:
      - e3lani_net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────────────────────────
  # Nginx — reverse proxy + SSL termination + static assets
  # ─────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: e3lani_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro          # mount your SSL certs here
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
    networks:
      - e3lani_net
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────────────────────
  # Redis — session cache + rate limiting
  # ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: e3lani_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - e3lani_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ─────────────────────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────────────────────
volumes:
  redis_data:   { driver: local }
  nginx_cache:  { driver: local }
  nginx_logs:   { driver: local }
  app_logs:     { driver: local }

# ─────────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────────
networks:
  e3lani_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
