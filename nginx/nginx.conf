# ═══════════════════════════════════════════════════════════════
# Metal Art — nginx.conf
# Optimized for STC Cloud / Saudi Arabia edge
# ═══════════════════════════════════════════════════════════════

user  nginx;
worker_processes  auto;           # one worker per CPU core
worker_rlimit_nofile  65535;      # max open files per worker

error_log  /var/log/nginx/error.log  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use                 epoll;    # Linux async I/O
    multi_accept        on;       # accept all pending connections at once
}

http {
    # ── MIME types ──────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Charset ─────────────────────────────────────────────
    charset utf-8;

    # ── Logging ─────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      'rt=$request_time uct=$upstream_connect_time '
                      'uht=$upstream_header_time urt=$upstream_response_time';

    access_log  /var/log/nginx/access.log  main  buffer=16k  flush=5s;

    # ── Performance ─────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   75s;
    keepalive_requests  1000;
    reset_timedout_connection on;

    # ── Body / buffer sizes ─────────────────────────────────
    client_max_body_size    50m;    # match upload limit in configurator
    client_body_buffer_size  16k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;

    # ── Gzip compression ────────────────────────────────────
    gzip                on;
    gzip_comp_level     5;
    gzip_min_length     256;
    gzip_proxied        any;
    gzip_vary           on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2;

    # ── Brotli (if nginx-brotli module available) ───────────
    # brotli            on;
    # brotli_comp_level 4;
    # brotli_types      text/plain text/css application/javascript application/json image/svg+xml;

    # ── Upstream — Next.js app ───────────────────────────────
    upstream nextjs_upstream {
        server  app:3000;
        keepalive 32;
    }

    # ── Proxy cache ─────────────────────────────────────────
    proxy_cache_path  /var/cache/nginx
                      levels=1:2
                      keys_zone=NEXTJS_CACHE:20m
                      max_size=1g
                      inactive=60m
                      use_temp_path=off;

    # ── Rate limiting zones ──────────────────────────────────
    limit_req_zone  $binary_remote_addr  zone=api_limit:10m   rate=30r/m;
    limit_req_zone  $binary_remote_addr  zone=web_limit:20m   rate=200r/m;
    limit_conn_zone $binary_remote_addr  zone=conn_limit:10m;

    # ── Hide server tokens ───────────────────────────────────
    server_tokens off;
    more_clear_headers Server;   # requires headers_more module

    # ── SSL global settings ──────────────────────────────────
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers  off;
    ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache          shared:SSL:50m;
    ssl_session_timeout        1d;
    ssl_session_tickets        off;
    ssl_stapling               on;
    ssl_stapling_verify        on;

    # ── Include virtual host configs ─────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
